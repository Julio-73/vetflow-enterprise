name: VetFlow SaaS CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-validation:
    name: Backend Lint, Format & Tests (Python)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black isort pytest httpx sqlalchemy pydantic-settings cryptography pyjwt
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi

    - name: Run Ruff (Linter)
      run: ruff check backend/app

    - name: Run Black (Formatter Check)
      run: black --check backend/app

    - name: Run isort (Import Order Check)
      run: isort --check-only backend/app

    - name: Run Unit & Integration Tests (Pytest)
      env:
        DATABASE_URL: sqlite:///:memory:
        APP_ENV: testing
        JWT_SECRET: your_jwt_signing_secret_min_32_characters_here_12345
      run: |
        cd backend
        pytest tests/

  frontend-validation:
    name: Frontend Lint, Type Check & Build (Next.js)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Run ESLint (Linter)
      run: |
        cd frontend
        npm run lint

    - name: Run Type Checking
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Run Production Optimize Build
      run: |
        cd frontend
        npm run build
